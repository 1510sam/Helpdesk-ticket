<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Helpdesk - Gửi Yêu Cầu Hỗ Trợ</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .container {
        background: white;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        max-width: 800px;
        width: 100%;
        padding: 40px;
      }

      .header {
        text-align: center;
        margin-bottom: 30px;
      }

      .header h1 {
        color: #333;
        font-size: 28px;
        margin-bottom: 10px;
      }

      .header p {
        color: #666;
        font-size: 14px;
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 25px;
      }

      .form-group {
        margin-bottom: 25px;
      }

      .form-group.full-width {
        grid-column: 1 / -1;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: #333;
        font-weight: 600;
        font-size: 14px;
      }

      .required {
        color: #e74c3c;
      }

      input[type="text"],
      input[type="date"],
      select,
      textarea {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e0e0e0;
        border-radius: 8px;
        font-size: 14px;
        transition: all 0.3s;
        font-family: inherit;
      }

      input[type="text"]:focus,
      input[type="date"]:focus,
      select:focus,
      textarea:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      textarea {
        resize: vertical;
        min-height: 100px;
      }

      .file-upload {
        border: 2px dashed #e0e0e0;
        border-radius: 8px;
        padding: 30px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s;
        background: #f8f9fa;
      }

      .file-upload:hover {
        border-color: #667eea;
        background: #f0f2ff;
      }

      .file-upload.drag-over {
        border-color: #667eea;
        background: #e8ebff;
      }

      .file-upload-icon {
        font-size: 48px;
        margin-bottom: 10px;
        color: #667eea;
      }

      .file-upload-text {
        color: #666;
        font-size: 14px;
        margin-bottom: 5px;
      }

      .file-upload-hint {
        color: #999;
        font-size: 12px;
      }

      input[type="file"] {
        display: none;
      }

      .file-list {
        margin-top: 15px;
      }

      .file-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px;
        background: #f8f9fa;
        border-radius: 6px;
        margin-bottom: 8px;
      }

      .file-item-info {
        display: flex;
        align-items: center;
        gap: 10px;
        flex: 1;
      }

      .file-item-icon {
        color: #667eea;
        font-size: 20px;
      }

      .file-item-name {
        color: #333;
        font-size: 13px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .file-item-size {
        color: #999;
        font-size: 11px;
      }

      .remove-file {
        background: #e74c3c;
        color: white;
        border: none;
        padding: 5px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        transition: all 0.3s;
      }

      .remove-file:hover {
        background: #c0392b;
      }

      .btn-submit {
        width: 100%;
        padding: 15px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        margin-top: 10px;
      }

      .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
      }

      .btn-submit:disabled {
        background: #ccc;
        cursor: not-allowed;
        transform: none;
      }

      .loading {
        display: none;
        text-align: center;
        padding: 20px;
      }

      .loading.active {
        display: block;
      }

      .spinner {
        border: 3px solid #f3f3f3;
        border-top: 3px solid #667eea;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 0 auto 10px;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .message {
        display: none;
        padding: 15px;
        border-radius: 8px;
        margin-top: 20px;
        text-align: center;
      }

      .message.active {
        display: block;
      }

      .message.success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
      }

      .message.error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
      }

      @media (max-width: 768px) {
        .container {
          padding: 25px;
        }

        .header h1 {
          font-size: 24px;
        }

        .form-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>📋 Helpdesk - Yêu Cầu Hỗ Trợ</h1>
        <p>Vui lòng điền đầy đủ thông tin để chúng tôi hỗ trợ bạn tốt nhất</p>
      </div>

      <form id="helpdeskForm">
        <!-- Row 1 -->
        <div class="form-row">
          <div class="form-group">
            <label>Mã sự cố</label>
            <input
              type="text"
              id="maSuCo"
              name="maSuCo"
              readonly
              placeholder="Tự động tạo"
            />
          </div>

          <div class="form-group">
            <label>Ngày phát sinh <span class="required">*</span></label>
            <input type="date" id="ngayPhatSinh" name="ngayPhatSinh" required />
          </div>
        </div>

        <!-- Row 2 -->
        <div class="form-row">
          <div class="form-group">
            <label>Người báo sự cố <span class="required">*</span></label>
            <input
              type="text"
              id="nguoiBaoSuCo"
              name="nguoiBaoSuCo"
              required
              placeholder="Họ và tên"
            />
          </div>

          <div class="form-group">
            <label>Bộ phận <span class="required">*</span></label>
            <input
              type="text"
              id="boPhan"
              name="boPhan"
              required
              placeholder="IT, Kế toán, Marketing..."
            />
          </div>
        </div>

        <!-- Row 3 -->
        <div class="form-row">
          <div class="form-group">
            <label>Loại sự cố <span class="required">*</span></label>
            <select id="loaiSuCo" name="loaiSuCo" required>
              <option value="">-- Chọn loại sự cố --</option>
              <option value="HIS">HIS (Hệ thống thông tin bệnh viện)</option>
              <option value="BIS">
                BIS (Hệ thống Thông tin Thanh toán/Tính phí)
              </option>
              <option value="RIS">
                RIS (Hệ thống Thông tin Chẩn đoán Hình ảnh)
              </option>
              <option value="LIS">LIS (Hệ thống Thông tin Xét nghiệm)</option>
              <option value="PHIS">PHIS (Hệ thống Thông tin Dược)</option>
            </select>
          </div>

          <div class="form-group">
            <label>Mức độ ưu tiên <span class="required">*</span></label>
            <select id="mucDoUuTien" name="mucDoUuTien" required>
              <option value="">-- Chọn mức độ --</option>
              <option value="P1 - Khẩn cấp">P1 - Khẩn cấp</option>
              <option value="P2 - Cao">P2 - Cao</option>
              <option value="P3 - Thường">P3 - Thường</option>
            </select>
          </div>
        </div>

        <!-- Full width fields -->
        <div class="form-group">
          <label>Mô tả sự cố <span class="required">*</span></label>
          <textarea
            id="moTaSuCo"
            name="moTaSuCo"
            required
            placeholder="Vui lòng mô tả chi tiết vấn đề bạn gặp phải..."
          ></textarea>
        </div>

        <div class="form-group">
          <label>Người tiếp nhận <span class="required">*</span></label>
          <select id="nguoiTiepNhan" name="nguoiTiepNhan" required>
            <option value="">-- Chọn người tiếp nhận --</option>
            <option value="Tuấn">Tuấn</option>
            <option value="Hùng">Hùng</option>
            <option value="Khoa">Khoa</option>
            <option value="Huy">Huy</option>
          </select>
        </div>

        <div class="form-group">
          <label>Nguyên nhân</label>
          <textarea
            id="nguyenNhan"
            name="nguyenNhan"
            placeholder="Nguyên nhân gây ra sự cố (có thể điền sau)"
          ></textarea>
        </div>

        <div class="form-group">
          <label>Hướng xử lý</label>
          <textarea
            id="huongXuLy"
            name="huongXuLy"
            placeholder="Cách xử lý sự cố (có thể điền sau)"
          ></textarea>
        </div>

        <!-- Row 4 - Time fields -->
        <div class="form-row">
          <div class="form-group">
            <label>Thời gian bắt đầu xử lý</label>
            <input
              size="50"
              type="datetime-local"
              id="thoiGianBatDau"
              name="thoiGianBatDau"
            />
          </div>

          <div class="form-group">
            <label>Thời gian hoàn tất</label>
            <input
              size="50"
              type="datetime-local"
              id="thoiGianHoanTat"
              name="thoiGianHoanTat"
            />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Thời gian xử lý (phút)</label>
            <input
              type="text"
              id="thoiGianXuLy"
              name="thoiGianXuLy"
              placeholder="Ví dụ: 30"
            />
          </div>

          <div class="form-group">
            <label>Trạng thái <span class="required">*</span></label>
            <select id="trangThai" name="trangThai" required>
              <option value="">-- Chọn trạng thái --</option>
              <option value="Mới">Mới</option>
              <option value="Đang xử lý">Đang xử lý</option>
              <option value="Hoàn thành">Hoàn tất</option>
              <option value="Đóng">Đóng</option>
            </select>
          </div>
        </div>

        <!-- File upload -->
        <div class="form-group">
          <label>Link/File đính kèm (Ảnh, PDF, DOC, Excel...)</label>
          <div class="file-upload" id="fileUpload">
            <div class="file-upload-icon">⬆️</div>
            <div class="file-upload-text">
              Kéo thả file vào đây hoặc click để chọn
            </div>
            <div class="file-upload-hint">
              Hỗ trợ: JPG, PNG, PDF, DOC, DOCX, XLS, XLSX (Tối đa 10MB/file)
            </div>
          </div>
          <input
            type="file"
            id="fileInput"
            multiple
            accept="image/*,.pdf,.doc,.docx,.xls,.xlsx"
          />
          <div class="file-list" id="fileList"></div>
        </div>

        <div class="form-group">
          <label>Ghi chú</label>
          <textarea
            id="ghiChu"
            name="ghiChu"
            placeholder="Ghi chú thêm (nếu có)"
          ></textarea>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">
          📤 Gửi yêu cầu
        </button>
      </form>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Đang gửi yêu cầu của bạn...</p>
      </div>

      <div class="message" id="message"></div>
    </div>

    <script>
      // Configuration - CẦN THAY ĐỔI
      const CONFIG = {
        // Thay bằng URL Google Apps Script Web App của bạn
        SCRIPT_URL:
          "https://script.google.com/macros/s/AKfycbzlBGILk0qEQWXvAQHPHzYggwVX9SihCFG2Is97Y5V1mNxho7z64ynG0lcvq7og-iep/exec",
        MAX_FILE_SIZE: 10 * 1024 * 1024, // 10MB
        ALLOWED_TYPES: [
          "image/jpeg",
          "image/png",
          "image/gif",
          "application/pdf",
          "application/msword",
          "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
          "application/vnd.ms-excel",
          "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet",
        ],
      };

      let selectedFiles = [];

      // Generate incident ID
      function generateIncidentID() {
        const now = new Date();
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, "0");
        const day = String(now.getDate()).padStart(2, "0");
        return `INC-${year}${month}${day}-????`;
      }

      // Set default values
      window.onload = function () {
        document.getElementById("maSuCo").value = generateIncidentID();
        document.getElementById("ngayPhatSinh").value = new Date();
        document.getElementById("trangThai").value = "Mới";
      };

      // File upload handling
      const fileUpload = document.getElementById("fileUpload");
      const fileInput = document.getElementById("fileInput");
      const fileList = document.getElementById("fileList");

      fileUpload.addEventListener("click", () => fileInput.click());

      fileUpload.addEventListener("dragover", (e) => {
        e.preventDefault();
        fileUpload.classList.add("drag-over");
      });

      fileUpload.addEventListener("dragleave", () => {
        fileUpload.classList.remove("drag-over");
      });

      fileUpload.addEventListener("drop", (e) => {
        e.preventDefault();
        fileUpload.classList.remove("drag-over");
        handleFiles(e.dataTransfer.files);
      });

      fileInput.addEventListener("change", (e) => {
        handleFiles(e.target.files);
      });

      function handleFiles(files) {
        for (let file of files) {
          if (!CONFIG.ALLOWED_TYPES.includes(file.type)) {
            alert(`File ${file.name} không được hỗ trợ!`);
            continue;
          }
          if (file.size > CONFIG.MAX_FILE_SIZE) {
            alert(`File ${file.name} vượt quá kích thước cho phép (10MB)!`);
            continue;
          }
          selectedFiles.push(file);
        }
        displayFiles();
      }

      function displayFiles() {
        fileList.innerHTML = "";
        selectedFiles.forEach((file, index) => {
          const fileItem = document.createElement("div");
          fileItem.className = "file-item";
          fileItem.innerHTML = `
                    <div class="file-item-info">
                        <span class="file-item-icon">📄</span>
                        <div>
                            <div class="file-item-name">${file.name}</div>
                            <div class="file-item-size">${formatFileSize(
                              file.size,
                            )}</div>
                        </div>
                    </div>
                    <button type="button" class="remove-file" onclick="removeFile(${index})">✕ Xóa</button>
                `;
          fileList.appendChild(fileItem);
        });
      }

      function removeFile(index) {
        selectedFiles.splice(index, 1);
        displayFiles();
      }

      function formatFileSize(bytes) {
        if (bytes === 0) return "0 Bytes";
        const k = 1024;
        const sizes = ["Bytes", "KB", "MB", "GB"];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return (
          Math.round((bytes / Math.pow(k, i)) * 100) / 100 + " " + sizes[i]
        );
      }

      // Form submission
      document
        .getElementById("helpdeskForm")
        .addEventListener("submit", async (e) => {
          e.preventDefault();

          const submitBtn = document.getElementById("submitBtn");
          const loading = document.getElementById("loading");
          const message = document.getElementById("message");

          // Hiển thị trạng thái đang gửi
          submitBtn.disabled = true;
          loading.classList.add("active");
          message.classList.remove("active");

          try {
            // Chuẩn bị dữ liệu
            const formData = {
              maSuCo: document.getElementById("maSuCo").value,
              ngayPhatSinh: document.getElementById("ngayPhatSinh").value,
              nguoiBaoSuCo: document.getElementById("nguoiBaoSuCo").value,
              boPhan: document.getElementById("boPhan").value,
              loaiSuCo: document.getElementById("loaiSuCo").value,
              mucDoUuTien: document.getElementById("mucDoUuTien").value,
              moTaSuCo: document.getElementById("moTaSuCo").value,
              nguoiTiepNhan: document.getElementById("nguoiTiepNhan").value,
              nguyenNhan: document.getElementById("nguyenNhan").value,
              huongXuLy: document.getElementById("huongXuLy").value,
              thoiGianBatDau: document.getElementById("thoiGianBatDau").value,
              thoiGianHoanTat: document.getElementById("thoiGianHoanTat").value,
              thoiGianXuLy: document.getElementById("thoiGianXuLy").value,
              trangThai: document.getElementById("trangThai").value,
              ghiChu: document.getElementById("ghiChu").value,
              files: [],
            };

            // Chuyển file sang base64
            for (let file of selectedFiles) {
              const base64 = await fileToBase64(file);
              formData.files.push({
                name: file.name,
                type: file.type,
                data: base64,
              });
            }

            // GỌI HÀM TRỰC TIẾP TRÊN Code.gs
            google.script.run
              .withSuccessHandler((res) => {
                loading.classList.remove("active");
                submitBtn.disabled = false;

                // res là kết quả trả về từ hàm processForm ở backend
                if (res.success) {
                  message.className = "message success active";
                  message.textContent = `✅ Thành công! Mã sự cố: ${res.incidentId}`;
                  setTimeout(() => location.reload(), 3000);
                } else {
                  message.className = "message error active";
                  message.textContent = "❌ Lỗi: " + res.error;
                }
              })
              .withFailureHandler((err) => {
                loading.classList.remove("active");
                submitBtn.disabled = false;
                message.className = "message error active";
                message.textContent = "❌ Lỗi hệ thống: " + err.message;
              })
              .processForm(formData); // Gọi hàm processForm ở Code.gs
          } catch (error) {
            console.error("Error:", error);
            loading.classList.remove("active");
            submitBtn.disabled = false;
            message.className = "message error active";
            message.textContent = "❌ Có lỗi xảy ra. Vui lòng thử lại!";
          }
        });

      function fileToBase64(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.readAsDataURL(file);
          reader.onload = () => resolve(reader.result.split(",")[1]);
          reader.onerror = (error) => reject(error);
        });
      }
    </script>
  </body>
</html>
